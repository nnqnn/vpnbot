server {
    listen 80;
    server_name s2.nnqnn.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name s2.nnqnn.tech;

    ssl_certificate /etc/letsencrypt/live/s2.nnqnn.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s2.nnqnn.tech/privkey.pem;

    access_log /var/log/nginx/tgvpn-subscription.access.log;
    error_log /var/log/nginx/tgvpn-subscription.error.log;

    location /healthz {
        proxy_pass http://127.0.0.1:8088/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /sub/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        return 404;
    }
}
